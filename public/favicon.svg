<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo oscuro -->
  <rect width="32" height="32" rx="6" fill="#1a1108"/>

  <!-- Botella completa como path único -->
  <!-- Cuello estrecho arriba, hombros curvos, cuerpo ancho abajo -->
  <path d="
    M14 4.5
    L14 3
    L18 3
    L18 4.5
    L17.5 4.5
    L17.5 11
    C19.5 12 21 13.5 21 15
    L21 27
    Q21 29 19 29
    L13 29
    Q11 29 11 27
    L11 15
    C11 13.5 12.5 12 14.5 11
    L14.5 4.5
    Z
  " fill="#c47f17"/>

  <!-- Líquido zona inferior (mismo path recortado) -->
  <path d="
    M11 21
    L11 27
    Q11 29 13 29
    L19 29
    Q21 29 21 27
    L21 21
    Z
  " fill="#8a5a0a"/>

  <!-- Brillo sutil -->
  <rect x="13" y="15.5" width="1" height="8" rx="0.5" fill="#f0c060" opacity="0.15"/>

  <!-- Tachado diagonal -->
  <line x1="5" y1="5" x2="27" y2="27" stroke="#d4b483" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
</svg>
